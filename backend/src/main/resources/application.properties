# ── Server ──────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
# Trust the X-Forwarded-Proto / X-Forwarded-For headers injected by Railway's
# reverse proxy so that Spring (and springdoc) see "https" as the scheme instead
# of the internal "http" used between the proxy and the app container.
server.forward-headers-strategy=framework

# ── DataSource (MySQL) ──────────────────────────────────────────────────────────

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Keep the Hibernate session open for the full HTTP request so lazy relations
# can be accessed during response serialisation (Open Session in View pattern).
spring.jpa.open-in-view=true

# ── JWT ───────────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── Jackson ───────────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── SpringDoc / Swagger ───────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha